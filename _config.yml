# Site settings
title: UbuWiki 우부위키
url: "https://johngrib.github.io"
baseurl: ""
description: >
    우북이(Ubukki)의 개인 블로그 겸 위키

# My information
email: river20s@naver.com
author: Eun-Been Kang (a.k.a Ubukki)
profile: 우북이
twitter_username:
github_username: river20s
comment-support: utterances

# Build settings
plugins:
  - jekyll-paginate
  - jekyll-gist

permalink: /blog/:year/:month/:day/:title/

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

paginate: 10
paginator_path: "/blog"
paginate_path: "/blog/page:num/"

# Collections
collections:
    wiki:
        output: true
        permalink: /:collection/:path/

# Comment Service
giscus:
  repo: johngrib/johngrib.github.io
  repo_id: SAMPLE-VALUE
  category: Announcements
  category_id: SAMPLE-VALUE

google_analytics:
  ua: SAMPLE-VALUE
  encrypted_ua: THIS-IS-SAMPLE-VALUE

google_adsense:
  client: SAMPLE-VALUE

blame: "https://github.com/johngrib/johngrib.github.io/blame/master/_wiki"
edit: "https://github.com/johngrib/johngrib.github.io/edit/master/_wiki"
issue: "https://github.com/johngrib/johngrib.github.io/issues/new"

timezone: "Asia/Seoul"

# https://kramdown.gettalong.org/rdoc/Kramdown/Options.html - smart_quotes
kramdown:
    smart_quotes: ["apos", "apos", "quot", "quot"]
